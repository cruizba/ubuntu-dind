name: Test images

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    # TEMPORARY pin to 24.04: Sysbox only supports a specific set of distros/kernels
    # (https://github.com/nestybox/sysbox/blob/master/docs/distro-compat.md). The
    # kernel 7.0 on newer runner images (ubuntu-latest / ubuntu-26.04) appears to be
    # unstable with Sysbox (observed in CI, not an official Sysbox statement).
    # Revert to ubuntu-latest only once kernel 7.x is officially supported by Sysbox.
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu_version: "22.04"
            ubuntu_name: "jammy"
          - ubuntu_version: "24.04"
            ubuntu_name: "noble"
          - ubuntu_version: "26.04"
            ubuntu_name: "resolute"
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install sysbox
        run: |
          cd /tmp
          wget https://downloads.nestybox.com/sysbox/releases/v0.7.0/sysbox-ce_0.7.0-0.linux_amd64.deb
          sudo dpkg -i sysbox-ce_0.7.0-0.linux_amd64.deb || sudo apt-get install -f -y
          # The .deb postinstall cannot always start the service via systemctl
          # during dpkg (deb-systemd-invoke), so start it explicitly and wait
          # for the sysbox-fs socket before running sysbox-runc tests.
          sudo systemctl restart sysbox
          for i in $(seq 1 30); do
            [ -S /run/sysbox/sysfs.sock ] && break
            sleep 1
          done
          sudo systemctl status sysbox-fs sysbox-mgr --no-pager || true
          test -S /run/sysbox/sysfs.sock

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build standalone image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: false
          load: true
          file: Dockerfile
          platforms: linux/amd64
          build-args: |
            UBUNTU_VERSION=${{ matrix.ubuntu_version }}
          tags: |
            cruizba/ubuntu-dind:${{ matrix.ubuntu_name }}-test

      - name: Test standalone image (privileged mode)
        run: |
          chmod +x test.sh
          ./test.sh --mode privileged --use-systemd false --image-name cruizba/ubuntu-dind:${{ matrix.ubuntu_name }}-test

      - name: Test standalone image (sysbox-runc mode)
        run: |
          ./test.sh --mode sysbox-runc --use-systemd false --image-name cruizba/ubuntu-dind:${{ matrix.ubuntu_name }}-test

      - name: Build systemd image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: false
          load: true
          file: Dockerfile.systemd
          platforms: linux/amd64
          build-args: |
            UBUNTU_VERSION=${{ matrix.ubuntu_version }}
          tags: |
            cruizba/ubuntu-dind:${{ matrix.ubuntu_name }}-systemd-test

      - name: Test systemd image (privileged mode)
        run: |
          ./test.sh --mode privileged --use-systemd true --image-name cruizba/ubuntu-dind:${{ matrix.ubuntu_name }}-systemd-test

      - name: Test systemd image (sysbox-runc mode)
        run: |
          ./test.sh --mode sysbox-runc --use-systemd true --image-name cruizba/ubuntu-dind:${{ matrix.ubuntu_name }}-systemd-test
